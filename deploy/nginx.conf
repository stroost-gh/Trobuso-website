# =============================================================================
# Nginx-configuratie voor trobuso.nl
# Reverse proxy naar Next.js op localhost:3000
# SSL wordt automatisch ingevuld door Certbot
# =============================================================================

# --- Redirect www naar non-www ---
server {
    listen 80;
    listen [::]:80;
    server_name www.trobuso.nl;
    return 301 https://trobuso.nl$request_uri;
}

# --- Hoofdconfiguratie ---
server {
    listen 80;
    listen [::]:80;
    server_name trobuso.nl;

    # Certbot zal dit blok aanvullen met SSL-configuratie na:
    #   sudo certbot --nginx -d trobuso.nl -d www.trobuso.nl

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Maximale uploadgrootte (voor CMS-afbeeldingen etc.) ---
    client_max_body_size 10M;

    # --- Gzip-compressie ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # --- Statische bestanden uit Next.js build (lang cachen) ---
    location /_next/static/ {
        alias /var/www/trobuso/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # --- Statische Trobuso website (public/) ---
    root /var/www/trobuso/public;
    index index.html;

    # Statische bestanden met caching
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri @nextjs;
    }

    # Logo's en afbeeldingen
    location /logos/ {
        expires 30d;
        access_log off;
    }

    # --- Admin en API naar Next.js ---
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket-ondersteuning (voor HMR in dev, maar ook nuttig in productie)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Juiste headers doorgeven
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js interne routes (_next)
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback naar Next.js voor onbekende routes
    @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root: serveer index.html
    location = / {
        try_files /index.html =404;
    }

    # Overige paden: probeer statisch, anders Next.js
    location / {
        try_files $uri $uri/ @nextjs;
    }
}
